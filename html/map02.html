<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soldier Idle Test</title>
    <link rel="stylesheet" href="../css/map-game.css?v=20260427-3">
</head>
<body>
    <main class="shell">
        <div class="map-wrap" id="map-wrap">
            <canvas id="map-canvas" aria-label="Dungeon map"></canvas>
            <div id="enemy-layer" aria-hidden="true"></div>
            <div class="soldier is-idle" id="soldier" aria-label="Soldier idle animation"></div>
            <div id="darkness-overlay" style="position: absolute; inset: 0; pointer-events: none; z-index: 10;"></div>
        </div>
        <div class="status" id="status">加载地图中...</div>
    </main>

    <div class="death-overlay" id="death-overlay" hidden>
        <div class="death-panel" role="dialog" aria-modal="true" aria-labelledby="death-title">
            <h2 class="death-title" id="death-title">角色倒下了</h2>
            <p class="death-text" id="death-text">你可以选择复活并继续战斗，或者退出当前页面。</p>
            <div class="death-actions">
                <button type="button" id="revive-button">复活</button>
                <button type="button" class="exit" id="exit-button">退出</button>
            </div>
        </div>
    </div>

    <script src="../cpp/web/game_core.js?v=20260427-1"></script>
    <script src="../js/cpp-runtime.js?v=20260427-1"></script>
    <script src="../js/map-game-shared.js?v=20260427-4"></script>
    <script>
    startMapGame({
        mapFileName: 'map02.html',
        tmxPath: '../assets/map/地牢2.tmx',
        mapBgmSrc: '../assets/bgm/地牢脱战bgm2.mp3',
        spawnTile: { x: 5, y: 5 },

        returnEntryFrom: 'map03', 
        returnSpawnTile: { x: 5, y: 12 }, 

        enemySpawns: [
            { x: 15, y: 5 },
            { x: 14, y: 5 },
            { x: 22, y: 6 },
            { x: 28, y: 4 },
            { x: 35, y: 6 },
            { x: 41, y: 4 },
            { x: 42, y: 7 },
            { x: 42, y: 10 },
            { x: 36, y: 12 },
            { x: 31, y: 13 },
            { x: 27, y: 11 },
            { x: 14, y: 12 },
            { x: 13, y: 13 },
            { x: 8, y: 12 },
            { x: 43, y: 16 },
            { x: 40, y: 18 },
            { x: 34, y: 19 },
            { x: 9, y: 18 },
            { x: 9, y: 19 },
            { x: 9, y: 20 },
            { x: 10, y: 18 },
            { x: 10, y: 20 },
            { x: 11, y: 18 },
            { x: 11, y: 19 },
            { x: 11, y: 20 }
        ],

        portals: [
            {
                // 去地图一的点位
                tile: { x: 4, y: 5 },
                target: './map01.html',
                entryTag: 'map02'
            },
            {
                // 去地图三的点位
                tile: { x: 4, y: 12 },
                target: './map03.html',
                entryTag: 'map02',
                requireKey: true
            }
        ],

        eventTile: { x: -1, y: -1 }, 
        specialEventTarget: './map01.html',
        specialEventMode: 'armed',

        darknessRadius: 3
    });
</script>
</body>
</html>
