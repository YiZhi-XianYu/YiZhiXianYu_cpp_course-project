<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地牢战斗 - Map 03</title>
    <link rel="stylesheet" href="../css/map-game.css?v=20260428-1">
</head>
<body>
    <main class="shell">
        <div class="map-wrap" id="map-wrap">
            <canvas id="map-canvas" aria-label="Dungeon map"></canvas>
            <div id="enemy-layer" aria-hidden="true"></div>
            <div class="soldier is-idle" id="soldier" aria-label="Soldier idle animation"></div>
        </div>
        <div class="status" id="status">加载地图中...</div>
    </main>

    <div class="death-overlay" id="death-overlay" hidden>
        <div class="death-panel" role="dialog" aria-modal="true" aria-labelledby="death-title">
            <h2 class="death-title" id="death-title">角色倒下了</h2>
            <p class="death-text" id="death-text">你可以选择复活并继续战斗，或者退出当前页面。</p>
            <div class="death-actions">
                <button type="button" id="revive-button">复活</button>
                <button type="button" class="exit" id="exit-button">退出</button>
            </div>
        </div>
    </div>

    <div class="victory-overlay" id="victory-overlay" hidden>
        <div class="victory-panel" role="dialog" aria-modal="true" aria-labelledby="victory-title">
            <h2 class="victory-title" id="victory-title">胜利！</h2>
            <p class="victory-text" id="victory-text">哥布林大王已经被击败</p>
            <div class="victory-actions">
                <button type="button" class="exit" id="victory-exit-button">退出</button>
            </div>
        </div>
    </div>

    <script src="../cpp/web/game_core.js?v=20260427-1"></script>
    <script src="../js/cpp-runtime.js?v=20260427-1"></script>
    <script src="../js/map-game-shared.js?v=20260428-1"></script>
    <script>
        startMapGame({
            mapFileName: 'map03.html',
            tmxPath: '../assets/map/地牢3.tmx',
            
            mapBgmSrc: [
                '../assets/bgm/地牢战斗bgm2.mp3', 
                '../assets/bgm/地牢战斗bgm1.mp3'
            ],
            
            spawnTile: { x: 17, y: 16 }, 

            enemySpawns: [
                { x: 14, y: 19 },
                { x: 20, y: 19 },
                { x: 17, y: 22 }
            ],

            eventTile: { x: 17, y: 19 },
            specialEventTarget: './map02.html',
            specialEventEntryTag: 'map03',
            specialEventMode: 'armed',
            victoryOnBossDeath: true
        });
    </script>
</body>
</html>
