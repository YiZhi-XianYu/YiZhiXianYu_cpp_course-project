<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ADVENTURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=20260427-3">
</head>
<body>

    <div id="stars-container"></div>
    
    <div id="gif-bg"></div>

    <div id="main-menu">
        <h1 class="game-title">PIXEL<br>ADVENTURE</h1>

        <div class="btn-container">
            <button class="pixel-btn" id="btn-start">开始游戏</button>
            <button class="pixel-btn" id="btn-load">读取存档</button>
            <button class="pixel-btn" id="btn-switch">界面切换</button>
        </div>

        <div class="footer-text blink">
            [ WELCOME TO PLAY ]
        </div>
    </div>

    <div class="role-overlay" id="role-overlay" hidden>
        <div class="role-panel" role="dialog" aria-modal="true" aria-labelledby="role-title">
            <h2 class="role-title" id="role-title">选择职业</h2>
            <p class="role-subtitle">点击一个职业开始冒险</p>
            <div class="role-grid">
                <button class="role-card" id="role-mage" type="button" data-role="plainPhysicalMage">
                    <span class="role-art role-art-mage" aria-hidden="true"></span>
                    <span class="role-name">平平无奇的物理魔法使</span>
                    <span class="role-desc">近战连段，快刀乱斩</span>
                </button>
                <button class="role-card" id="role-archer" type="button" data-role="legendaryLineArcher">
                    <span class="role-art role-art-archer" aria-hidden="true"></span>
                    <span class="role-name">只射直线的传奇弓箭手</span>
                    <span class="role-desc">超远散射，反弹箭矢</span>
                </button>
            </div>
            <button class="role-cancel" id="role-cancel" type="button">取消</button>
        </div>
    </div>

    <script src="../js/start.js?v=20260427-3"></script>
</body>
</html>
